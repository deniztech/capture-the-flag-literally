<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capture The Flag, Literally</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        height: 100dvh; /* Dynamic viewport height */
        width: 100vw;
        overflow: hidden; /* Prevent scrolling */
        background-color: #0f172a; /* Slate 900 */
      }
      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      h1, h2, h3, .brand-font {
        font-family: 'Fredoka', sans-serif;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes bounceIn {
        0%   { opacity: 0; transform: scale(0.4); }
        55%  { opacity: 1; transform: scale(1.08); }
        75%  { transform: scale(0.95); }
        100% { transform: scale(1); }
      }
      @keyframes greetingPop {
        0%   { opacity: 0; transform: translateY(8px) scale(0.95); }
        15%  { opacity: 1; transform: translateY(0) scale(1); }
        80%  { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-6px) scale(0.97); }
      }
      .animate-fade-in     { animation: fadeIn 0.35s ease-out forwards; }
      .animate-fade-in-up  { animation: fadeInUp 0.4s ease-out forwards; }
      .animate-bounce-in   { animation: bounceIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
      .animate-greeting    { animation: greetingPop 3.5s ease-in-out forwards; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "d3": "https://esm.sh/d3@^7.9.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.33.0",
    "topojson-client": "https://esm.sh/topojson-client@^3.1.0",
    "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-900 text-slate-100 antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
